[advisories]
ignore = [
    # RUSTSEC-2023-0071: Marvin Attack timing sidechannel in `rsa` crate.
    # Transitive dependency via russh -> internal-russh-forked-ssh-key -> rsa.
    # No upstream fix available. Acceptable risk: SSH key operations are local,
    # not exposed to network-observable timing attacks in our usage.
    "RUSTSEC-2023-0071",
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "CDLA-Permissive-2.0",
    "CC0-1.0",
    "MPL-2.0",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
